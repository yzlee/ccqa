name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write   # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1. Node 24
      # ships npm 11, but we bump to the latest just in case the bundled
      # version drifts.
      - name: Upgrade npm
        run: npm install -g npm@latest


      - name: Verify tag matches @ccqa/cli version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./cli/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match cli/package.json version $PKG"
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Build
        run: npm --workspace shared run build && npm --workspace cli run build

      - name: Typecheck
        run: npm run typecheck

      # Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
      # The package's "Trusted Publisher" must be configured on
      # npmjs.com to point at this repo + workflow first. See
      # https://docs.npmjs.com/trusted-publishers for setup.
      - name: Publish to npm
        working-directory: cli
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
